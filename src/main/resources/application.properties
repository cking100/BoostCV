# Server Configuration
server.port=${PORT:8080}

# PostgreSQL Configuration
# Uses external Render hostname so it works both locally and on Render
spring.datasource.url=jdbc:postgresql://dpg-d8e0ho6rnols739q985g-a.oregon-postgres.render.com:5432/ats_checker_db
spring.datasource.username=chirag
spring.datasource.password=sih6fXUQY6UFqtfViKlfazFVDmfOQLM8
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool — tuned for Render free-tier PostgreSQL
# Render closes idle DB connections after ~5 min; keep pool lifecycle shorter
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
app.jwt.secret=mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File Storage
app.file.upload-dir=./uploads

# CORS Configuration — authoritative list read by SecurityConfig.java and WebConfig.java
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://boostcv.vercel.app

